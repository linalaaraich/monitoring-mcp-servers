name: build-push

# Build + publish all five MCP server images to GitHub Container Registry
# on every push to main. Same pattern as monitoring-triage-service's
# build-push.yml, parallelized via a matrix over the five subdirectories.
#
# Tags per run:
#   - main              (rolling, what Watchtower on the laptop tracks)
#   - sha-<short-sha>   (immutable)
#   - latest            (only on default branch)
#
# Build cache via type=gha so warm builds finish in ~15s. Paths filter
# scopes the trigger — a change to one MCP's code/Dockerfile rebuilds
# only that MCP; docs-only changes skip CI entirely.

on:
  push:
    branches: [main]
    paths:
      - "prometheus_mcp/**"
      - "loki_mcp/**"
      - "jaeger_mcp/**"
      - "drain3_mcp/**"
      - "rca_history_mcp/**"
      - "shared/**"
      - "requirements.txt"
      - ".github/workflows/build-push.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false    # don't cancel the other four if one fails
      matrix:
        mcp:
          - { dir: prometheus_mcp,  image: mcp-prometheus }
          - { dir: loki_mcp,        image: mcp-loki }
          - { dir: jaeger_mcp,      image: mcp-jaeger }
          - { dir: drain3_mcp,      image: mcp-drain3 }
          - { dir: rca_history_mcp, image: mcp-rca-history }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.mcp.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.mcp.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.mcp.dir }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.mcp.image }}
          cache-to: type=gha,scope=${{ matrix.mcp.image }},mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed ${{ matrix.mcp.image }} to GHCR"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.meta.outputs.tags }}"
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
